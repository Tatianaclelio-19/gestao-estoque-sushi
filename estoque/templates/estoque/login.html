<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Food Fixe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #1b5e20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1b5e20, #66bb6a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #fff;
            margin: 0 auto 1.25rem;
        }
        .login-card h4 {
            font-weight: 700;
            color: #212529;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            text-align: center;
            color: #6c757d;
            font-size: 0.875rem;
            margin-bottom: 1.75rem;
        }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
        }
        .form-control {
            border-radius: 0 8px 8px 0;
            border: 1.5px solid #dee2e6;
            padding: 0.65rem 0.9rem;
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
        }
        .input-group-text {
            background: #f8f9fa;
            border: 1.5px solid #dee2e6;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #6c757d;
        }
        .btn-login {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.7rem;
            font-weight: 600;
            font-size: 0.95rem;
            width: 100%;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-login:hover  { opacity: 0.92; transform: translateY(-1px); color: #fff; }
        .btn-login:active { transform: translateY(0); color: #fff; }
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.78rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="login-logo">
        <i class="bi bi-box-seam"></i>
    </div>

    <h4>Food Fixe</h4>
    <p class="subtitle">Sistema de Gestão de Estoque</p>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger py-2 mb-3" style="font-size:0.875rem;border-radius:8px;">
            <i class="bi bi-exclamation-circle me-1"></i> {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label for="username" class="form-label">Utilizador</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="O seu username" required autofocus>
            </div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="A sua password" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
    </form>

    <div class="login-footer">
        &copy; 2026 Food Fixe Lda. — Todos os direitos reservados
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
